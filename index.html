<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Rummikub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a class="retour-atelier"
       href="https://pierreg78-maker.github.io/Atelier/"
       aria-label="Retour à l’Atelier">
        <span>Retour</span>
        <span>Atelier</span>
    </a>

<header>
        <h1>Mini-Rummikub</h1>
<div class="toggle-regle">
        <div class="toggle-curseur" id="toggle-curseur"></div>
        <button id="btn-min-2" class="toggle-option actif" onclick="definirTailleMinGroupe(2)">[2]</button>
        <button id="btn-min-3" class="toggle-option" onclick="definirTailleMinGroupe(3)">[3]</button>
    </div>
    </header>
    <div class="barre-haut">
        <button class="btn-partie" onclick="initialiserPartie()">Jouer</button>
        <div class="score-conteneur">SCORE : <span id="score">0</span></div>
    </div>
    
    <p id="journal"></p>
    <div id="plateau"></div>
    <div class="actions">
        <button class="btn-valider" onclick="validerCoup()">Valider</button>
        <button class="btn-piocher" onclick="joueurPioche()">Piocher</button>
    </div>
    <div id="main-joueur"></div>
    <script src="jeu.js"></script>
</body>
</html>
