<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Rummikub Access</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f8f9fa; margin: 0; padding: 10px; }
        header h1 { font-size: 2em; margin-bottom: 5px; }
        header p { font-size: 1.2em; color: #777; }

        #tour-actuel { font-weight: bold; color: #2575fc; }
        #journal { min-height: 1.4em; color: #555; font-style: italic; margin: 6px 0; }
        #ordi-info { color: #777; font-size: 0.95em; }

        #plateau {
            min-height: 150px; border: 3px dashed #d4af37; padding: 10px; margin: 10px auto;
            width: 95%; display: flex; flex-wrap: wrap; align-content: flex-start; justify-content: center; position: relative;
        }
        #plateau::before {
            content: "Dépose ici tes tuiles pour former paires, trios ou suites";
            position: absolute; color: #ccc; font-weight: bold; pointer-events: none;
        }

        .groupe {
            display: flex; align-items: center; border: 4px solid #2c3e50; border-radius: 12px;
            padding: 8px 10px; margin: 10px; background: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
            position: relative;
        }
        .groupe::before {
            content: attr(data-numero);
            position: absolute; top: -12px; left: 8px;
            background: #2c3e50; color: white; font-size: 0.75em; font-weight: bold;
            padding: 1px 8px; border-radius: 10px;
        }

        .nouveau-groupe {
            display: flex; align-items: center; justify-content: center;
            min-width: 20vw; min-height: 25vw; max-width: 90px; max-height: 115px;
            border: 3px dashed #2575fc; border-radius: 10px;
            margin: 8px; padding: 6px; color: #2575fc; font-weight: 600;
            font-size: 0.85em; text-align: center; background: rgba(37,117,252,0.06);
        }

        #main-joueur {
            min-height: 120px; border: 2px solid #ddd; padding: 5px; margin: 10px auto;
            width: 95%; display: flex; flex-wrap: wrap; justify-content: center;
        }

        .tuile {
            width: 18vw; height: 25vw; max-width: 80px; max-height: 110px;
            border: 3px solid #d4af37; border-radius: 12px; margin: 5px;
            font-size: 8vw; font-weight: bold; display: flex; align-items: center;
            justify-content: center; cursor: grab; color: white;
        }
        .rouge { background: linear-gradient(135deg, #ff7e5f, #feb47b); }
        .vert { background: linear-gradient(135deg, #56ab2f, #a8e063); }
        .bleu { background: linear-gradient(135deg, #4facfe, #00f2fe); }

        /* Boutons modernes : deux coins arrondis (haut-gauche / bas-droit) */
        .actions, .actions-tri, .actions-partie { margin: 8px 0; }
        button {
            border: none;
            padding: 10px 18px;
            font-size: 0.95em;
            font-weight: 600;
            color: white;
            cursor: pointer;
            border-radius: 22px 6px 22px 6px;
            margin: 4px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.18);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 12px rgba(0,0,0,0.22); }
        button:active { transform: translateY(0); box-shadow: 0 2px 5px rgba(0,0,0,0.18); }

        .btn-partie { background: linear-gradient(135deg, #6a11cb, #2575fc); }
        .btn-valider { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .btn-annuler { background: linear-gradient(135deg, #eb3349, #f45c43); }
        .btn-piocher { background: linear-gradient(135deg, #f7971e, #ffd200); color: #5a4300; }
        .btn-tri { background: linear-gradient(135deg, #8e9eab, #5b6a78); }
    </style>
</head>
<body>
    <header>
        <h1>Mini-Rummikub</h1>
        <p>3 couleurs, tuiles de 1 à 6 — paires, trios et suites</p>
    </header>
    <div class="actions-partie">
        <button class="btn-partie" onclick="initialiserPartie()">Nouvelle Partie</button>
        <p>Score : <span id="score">0</span></p>
        <p>Tour : <span id="tour-actuel">À toi de jouer !</span></p>
        <p id="ordi-info">Tuiles restantes chez l'ordinateur : <span id="ordi-compte">5</span></p>
        <p id="journal"></p>
    </div>
    <div id="plateau"></div>
    <div class="actions">
        <button class="btn-valider" onclick="validerCoup()">Valider mon coup</button>
        <button class="btn-annuler" onclick="annulerCoup()">Annuler mon coup</button>
        <button class="btn-piocher" onclick="joueurPioche()">Piocher (passer)</button>
    </div>
    <div class="actions-tri">
        <button class="btn-tri" onclick="trierMainParCouleur()">Trier par couleur</button>
        <button class="btn-tri" onclick="trierMainParChiffre()">Trier par chiffre</button>
    </div>
    <div id="main-joueur"></div>
    <script src="jeu.js"></script>
</body>
</html>
