<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mini-Rummikub Access</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; }
        #plateau, #main-joueur {
            min-height: 180px; border: 3px dashed #666; padding: 20px;
            margin: 20px auto; width: 80%; border-radius: 12px;
            display: flex; flex-wrap: wrap; justify-content: center;
        }
        .tuile {
            width: 70px; height: 100px; border: 2px solid #333;
            border-radius: 10px; margin: 10px; font-size: 32px;
            font-weight: bold; display: flex; align-items: center;
            justify-content: center; cursor: grab; box-shadow: 3px 3px 8px rgba(0,0,0,0.2);
        }
        .rouge { background-color: #ff9999; }
        .vert { background-color: #99ff99; }
        .bleu { background-color: #9999ff; }
    </style>
</head>
<body>
    <h1>Mini-Rummikub (36 Tuiles)</h1>
    <div id="plateau" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <div id="main-joueur" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

    <script src="jeu.js"></script>

    <button onclick="joueurPioche()">Piocher une tuile</button>

    
    <div id="controle">
    <button onclick="reinitialiserPartie()">Nouvelle Partie</button>
    <p>Score : <span id="score">0</span> tuiles posées</p>
</div>
</body>
</html>
